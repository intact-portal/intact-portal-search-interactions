image: docker:latest
services:
  - docker:stable-dind
variables:
  CONTAINER_IMAGE: ${CI_REGISTRY_IMAGE}:latest
  DOCKER_TLS_CERTDIR: ""
stages:
  - build-jar
  - build-docker-image
  - kubernetes-deploy

maven-build-test:
  image: maven:3.6-jdk-11
  stage: build-jar
  script: "mvn package -B -s settings.xml -P ip-solr-indexing-hx,dev-config"
  after_script:
    - "mkdir /builds/intact-ci/intact-portal-search-interactions/target/"
    - "cp /builds/intact-ci/intact-portal-search-interactions/intact-search-interactions-ws/target/intact-search-interactions-ws.jar /builds/intact-ci/intact-portal-search-interactions/target/"
  artifacts:
    paths:
      - target/*.jar

maven-build-prod:
  image: maven:3.6-jdk-11
  stage: build-jar
  script: "mvn package -B -s settings.xml -P ip-solr-indexing-hx,prod-config"
  after_script:
    - "mkdir /builds/intact-ci/intact-portal-search-interactions/target/"
    - "cp /builds/intact-ci/intact-portal-search-interactions/intact-search-interactions-ws/target/intact-search-interactions-ws.jar /builds/intact-ci/intact-portal-search-interactions/target/"
  artifacts:
    paths:
      - target/*.jar

.docker-build:
  stage: build-docker-image
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
    - docker --version
    - echo ${CONTAINER_IMAGE}
  script:
    - docker build -t ${CONTAINER_IMAGE} --no-cache .
    - docker image ls
    - docker push ${CONTAINER_IMAGE}
    - docker rmi ${CONTAINER_IMAGE}
    - docker logout "$CI_REGISTRY"

docker-build-test:
  needs: [ maven-build-test ]
  extends: [ .docker-build ]

docker-build-prod:
  needs: [ maven-build-prod ]
  extends: [ .docker-build ]

hh-production-deploy:
  stage: kubernetes-deploy
  image: alpine
  script:
    - apk add --no-cache curl git
    - curl -LO https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl
    - chmod +x ./kubectl
    - mv ./kubectl /usr/local/bin/kubectl
    - git clone https://k8s-config-token:${K8S_CONFIG_TOKEN_HH}@gitlab.ebi.ac.uk/intact-ci/k8s-config
    - mkdir ~/.kube
    - cp k8s-config/config ~/.kube/
    - kubectl config use-context harlow-production
    - 'printf "$(kubectl create secret docker-registry gitlab-registry --docker-server=$CI_REGISTRY --docker-username=$CI_DEPLOY_USER --docker-password=$CI_DEPLOY_PASSWORD --docker-email=$GITLAB_USER_EMAIL -o yaml --dry-run=client)" | kubectl apply -f -'
    - kubectl get secrets gitlab-registry -o yaml
    - kubectl apply -f k8s-production/k8s_deploy.yml
    - kubectl rollout restart deployment/intact-portal-search-interactions-deployment
    - kubectl get nodes
  when: manual
  needs: [ docker-build-prod ]

