image: docker:latest
services:
  - docker:stable-dind
variables:
  CONTAINER_IMAGE: ${CI_REGISTRY_IMAGE}:latest
  DOCKER_TLS_CERTDIR: ""
stages:
  - build-jar
  - build-docker-image
  - kubernetes-deploy

maven-build:
  image: maven:3.6-jdk-11
  stage: build-jar
  script:
    - mvn package -B -s settings.xml -P search-interactions-ws
    - POM_VERSION=$(mvn -Dexec.executable='echo' -Dexec.args='${project.version}' --non-recursive exec:exec -q)
    - echo "IMAGE_TAG=$POM_VERSION-$CI_COMMIT_SHORT_SHA" > build.env
    - mkdir /builds/intact-ci/intact-portal-search-interactions/target/
    - cp /builds/intact-ci/intact-portal-search-interactions/intact-search-interactions-ws/target/intact-search-interactions-ws.jar /builds/intact-ci/intact-portal-search-interactions/target/
  artifacts:
    paths:
      - target/*.jar
    reports:
      dotenv: build.env
  when: manual

docker-build:
  stage: build-docker-image
  needs: [ maven-build ]
  before_script:
    - unset DOCKER_HOST
    - unset DOCKER_AUTH_CONFIG
    - docker system prune -af
  script:
    - echo "$CI_DOCKER_HUB_PASSWORD" | docker login -u $CI_DOCKER_HUB_USER --password-stdin
    - echo "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
    - docker build -t "$CI_REGISTRY_IMAGE:$IMAGE_TAG" --no-cache .
    - docker image ls
    - docker logout
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
    - docker push "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
    - docker rmi "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
    - docker logout $CI_REGISTRY

.kubernetes-deploy:
  stage: kubernetes-deploy
  image: alpine
  before_script:
    - apk add --no-cache curl git
    - curl -LO https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl
    - chmod +x ./kubectl
    - mv ./kubectl /usr/local/bin/kubectl
    - git clone https://k8s-config-token:$K8S_CONFIG_TOKEN@gitlab.ebi.ac.uk/intact-ci/k8s-config
    - mkdir ~/.kube
    - cp k8s-config/config ~/.kube/
  script:
    - kubectl config get-contexts
    - kubectl config use-context $KUBE_CONTEXT
    - kubectl create secret docker-registry gitlab-registry --docker-server=$CI_REGISTRY --docker-username=$CI_REGISTRY_USER --docker-password=$CI_JOB_TOKEN --docker-email=$GITLAB_USER_EMAIL --dry-run=client -o yaml | kubectl apply -f -
    - kubectl get secrets gitlab-registry -o yaml
    - echo "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
    - sed -i -e "s|<IMAGE_TAG>|$CI_REGISTRY_IMAGE:$IMAGE_TAG|g" k8s-deploy-config/k8s_deploy.yml
    - kubectl apply -f k8s-deploy-config/k8s_deploy.yml
    - kubectl rollout restart deployment/intact-portal-search-interactions-deployment
    - kubectl get nodes
  when: manual

hh-test-deploy:
  extends: .kubernetes-deploy
  needs: [ maven-build, docker-build ]
  variables:
    KUBE_CONTEXT: hh-intact-test
  environment:
    name: hh/test
    deployment_tier: testing
    url: http://hh-rke-wp-webadmin-99-worker-1.caas.ebi.ac.uk:31242/intact/ws/interaction

hx-prod-deploy:
  extends: .kubernetes-deploy
  needs: [ maven-build, docker-build ]
